    .gray-box { fill: #444441; stroke: #B4B2A9; } .gray-t { fill: #D3D1C7; } .gray-s { fill: #B4B2A9; }
    .blue-box { fill: #0C447C; stroke: #85B7EB; } .blue-t { fill: #B5D4F4; } .blue-s { fill: #85B7EB; }
    .coral-box { fill: #712B13; stroke: #F0997B; } .coral-t { fill: #F5C4B3; } .coral-s { fill: #F0997B; }

<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: transparent;">
<style>
  .th { font-size: 14px; font-weight: 500; fill: #2c2c2a; }
